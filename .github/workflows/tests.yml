name: Python Tests

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          # matplotlib needed by D13/D16/D17 derivation modules imported by tests.
          # sympy needed by D1-D6, D14, D15, D18, D18b symbolic derivations.
          pip install pytest pytest-cov numpy scipy matplotlib sympy mpmath
      - name: Run pytest
        run: pytest tests/ -v
