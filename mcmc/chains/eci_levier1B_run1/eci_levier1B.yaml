# eci_levier1B.yaml — Levier #1B (no EDE, no c'_DD) joint constraint
#
# 10 sampled parameters: ω_b, ω_cdm, H_0, n_s, ln(10¹⁰A_s), τ_reio,
#                         w_0_fld, w_a_fld, ξ_χ, χ_initial.
#
# Likelihoods: Planck 2018 plik TTTEEE+lowl+lensing + DESI DR2 BAO
#              + Pantheon+ + KiDS-1000 S₈ (via eci_kids_s8 plugin with
#              Cassini wall ON and ACT penalty OFF — no c'_DD here).
#
# Theory: vanilla CLASS 3.3.4 (AxiCLASS shooting bug not yet resolved on
# Zen 3, see notes/vastai-debug-2026-05-02.md F6 follow-up;
# scripts/vastai/axiclass-fp-fix-README.md). Vanilla classy is sufficient
# for this NMC + w0wa + Planck reproduction — EDE and c'_DD are deferred
# to a true Levier #1 12-param when the AxiCLASS shooting is fixed.
#
# Goal: replicate Wolf et al. 2025 PRL (arXiv:2504.07679, log B = 7.34
# for NMC vs ΛCDM on Planck PR4 + DR2 BAO + Pantheon+) with the v6.0.16
# eci_nmc_theory plugin, and extend with KiDS-1000 S₈ prior. The
# expected outcome is a tightening of ξ_χ from the prior-dominated v5
# regime to a Planck-driven posterior (factor 3-10× tighter per the
# v50plusS8 follow-up analysis in notes/posterior_v50plusS8_vs_v5).
#
# This is a PRD-letter-class target if (a) ξ_χ shows ≥2σ deviation from
# zero, (b) H_0 tension shifts toward SH0ES, (c) S_8 tension is reduced.
#
# Walltime estimate: ~5-10 hours on Vast.ai EPYC 7V13 (CMB power
# spectrum makes CLASS ~10× slower per step). Cost: ~$2-5.

theory:
  classy:
    ignore_obsolete: true
    provides:
    - Hubble
    - angular_diameter_distance
    - rdrag
    - Cl
    - sigma8
    - Omega_m
    extra_args:
      output: tCl,pCl,lCl,mPk
      lensing: 'yes'
      l_max_scalars: 2700
      N_ur: 2.0328
      N_ncdm: 1
      m_ncdm: 0.06
      Omega_Lambda: 0
      use_ppf: 'yes'
      fluid_equation_of_state: CLP
  eci_nmc_theory.ECINMCTheory:
    python_path: /root/crossed-cosmos/mcmc/cobaya_nmc/
    provides:
    - G_eff_over_GN
    - eta_slip
    - fsigma8
    - chi_of_a
    - wa_nmc_correction

likelihood:
  # Pure-Python Planck likelihoods (no plc/clik C library required).
  # NPIPE high-l CamSpec is PR4 data with native CamSpec_python implementation.
  planck_2018_lowl.TT: null
  planck_2018_lowl.EE: null
  planck_NPIPE_highl_CamSpec.TTTEEE: null
  planck_2018_lensing.native: null
  bao.desi_dr2.desi_bao_all: null
  sn.pantheonplus: null
  eci_kids_s8.ECIKiDSS8Likelihood:
    python_path: /root/crossed-cosmos/mcmc/cobaya_nmc/
    apply_cassini_wall: true       # Cassini hard wall ON: |ξ_χ|*(χ_0/M_P)² < 6e-6
    apply_act_penalty: false       # OFF: c'_DD not sampled in this run
    kids_s8_mean: 0.766
    kids_s8_sigma: 0.020
    chi0_over_MP: 0.1

params:
  H0:
    prior: {min: 55, max: 85}
    ref: {dist: norm, loc: 67.4, scale: 0.5}
    proposal: 0.5
    latex: H_0
  omega_b:
    prior: {dist: norm, loc: 0.02237, scale: 0.00015}
    ref: {dist: norm, loc: 0.02237, scale: 0.00015}
    proposal: 0.00015
    latex: \Omega_\mathrm{b} h^2
  omega_cdm:
    prior: {min: 0.10, max: 0.14}
    ref: {dist: norm, loc: 0.12, scale: 0.0012}
    proposal: 0.0012
    latex: \Omega_\mathrm{c} h^2
  n_s:
    prior: {min: 0.88, max: 1.06}
    ref: {dist: norm, loc: 0.9649, scale: 0.0042}
    proposal: 0.0042
    latex: n_\mathrm{s}
  logA:
    prior: {min: 2.5, max: 3.5}
    ref: {dist: norm, loc: 3.044, scale: 0.014}
    proposal: 0.014
    drop: true
    latex: \log(10^{10} A_\mathrm{s})
  A_s:
    value: 'lambda logA: 1e-10*np.exp(logA)'
    latex: A_\mathrm{s}
  tau_reio:
    prior: {dist: norm, loc: 0.0544, scale: 0.007}
    ref: {dist: norm, loc: 0.0544, scale: 0.007}
    proposal: 0.007
    latex: \tau
  w0_fld:
    prior: {min: -1.2, max: -0.5}
    ref: {dist: norm, loc: -1.0, scale: 0.05}
    proposal: 0.05
    latex: w_0
  wa_fld:
    prior: {min: -2.0, max: 0.0}
    ref: {dist: norm, loc: 0.0, scale: 0.1}
    proposal: 0.1
    latex: w_a
  xi_chi:
    prior: {min: -0.024, max: 0.024}    # Cassini-tightened range
    ref: {dist: norm, loc: 0.0, scale: 0.005}
    proposal: 0.005
    latex: \xi_\chi
  chi_initial:
    prior: {min: 0.05, max: 0.20}
    ref: {dist: norm, loc: 0.10, scale: 0.01}
    proposal: 0.01
    latex: \chi_\mathrm{ini}
  wa_nmc_correction:
    derived: true
    latex: \Delta w_a^\mathrm{NMC}
  Omega_m:
    latex: \Omega_\mathrm{m}
  sigma8:
    latex: \sigma_8
  S8:
    derived: 'lambda sigma8, Omega_m: sigma8 * (Omega_m / 0.3) ** 0.5'
    latex: S_8

sampler:
  mcmc:
    burn_in: 0
    max_samples: 50000
    max_tries: 10000
    covmat: auto
    proposal_scale: 1.0       # tighter than v5 (1.9): reflects expected Planck-tightened posterior
    Rminus1_stop: 0.02        # production-quality convergence
    Rminus1_cl_stop: 0.2
    learn_proposal: true
    learn_proposal_Rminus1_max: 2.0
    oversample_power: 0.4     # oversample slow params (xi_chi, chi_initial)

output: eci_levier1B
packages_path: mcmc/packages/
