params:
  H0:
    prior:
      min: 55
      max: 85
    ref:
      dist: norm
      loc: 67.4
      scale: 0.5
    proposal: 0.5
    latex: H_0
  omega_b:
    prior:
      dist: norm
      loc: 0.02237
      scale: 0.00015
    ref:
      dist: norm
      loc: 0.02237
      scale: 0.00015
    proposal: 0.00015
    latex: \Omega_\mathrm{b} h^2
    renames:
    - omegabh2
  omega_cdm:
    prior:
      min: 0.1
      max: 0.14
    ref:
      dist: norm
      loc: 0.12
      scale: 0.0012
    proposal: 0.0012
    latex: \Omega_\mathrm{c} h^2
    renames:
    - omegach2
  n_s:
    prior:
      min: 0.88
      max: 1.06
    ref:
      dist: norm
      loc: 0.9649
      scale: 0.0042
    proposal: 0.0042
    latex: n_\mathrm{s}
    renames:
    - ns
  logA:
    prior:
      min: 2.5
      max: 3.5
    ref:
      dist: norm
      loc: 3.044
      scale: 0.014
    proposal: 0.014
    drop: true
    latex: \log(10^{10} A_\mathrm{s})
  A_s:
    value: 'lambda logA: 1e-10*np.exp(logA)'
    latex: A_\mathrm{s}
    derived: true
    renames:
    - As
  tau_reio:
    prior:
      dist: norm
      loc: 0.0544
      scale: 0.007
    ref:
      dist: norm
      loc: 0.0544
      scale: 0.007
    proposal: 0.007
    latex: \tau
    renames:
    - tau
  w0_fld:
    prior:
      min: -1.2
      max: -0.5
    ref:
      dist: norm
      loc: -1.0
      scale: 0.05
    proposal: 0.05
    latex: w_0
    renames:
    - w
  wa_fld:
    prior:
      min: -2.0
      max: 0.0
    ref:
      dist: norm
      loc: 0.0
      scale: 0.1
    proposal: 0.1
    latex: w_a
    renames:
    - wa
  xi_chi:
    prior:
      min: -0.024
      max: 0.024
    ref:
      dist: norm
      loc: 0.0
      scale: 0.005
    proposal: 0.005
    latex: \xi_\chi
  chi_initial:
    prior:
      min: 0.05
      max: 0.2
    ref:
      dist: norm
      loc: 0.1
      scale: 0.01
    proposal: 0.01
    latex: \chi_\mathrm{ini}
  wa_nmc_correction:
    derived: true
    latex: \Delta w_a^\mathrm{NMC}
  Omega_m:
    latex: \Omega_\mathrm{m}
    derived: true
    renames:
    - omegam
  sigma8:
    latex: \sigma_8
    derived: true
  S8:
    derived: 'lambda sigma8, Omega_m: sigma8 * (Omega_m / 0.3) ** 0.5'
    latex: S_8
  A_planck:
    prior:
      dist: norm
      loc: 1
      scale: 0.0025
    ref:
      dist: norm
      loc: 1
      scale: 0.002
    proposal: 0.0005
    latex: y_\mathrm{cal}
    renames: calPlanck
  use_fg_residual_model:
    value: 0
  cal0:
    value: 1
  cal2:
    value: 1
  amp_100:
    value: 0
  amp_143:
    prior:
      dist: uniform
      min: 0
      max: 50
    ref:
      dist: norm
      loc: 10
      scale: 1
    latex: A^{\rm power}_{143}
    proposal: 1
  amp_217:
    prior:
      dist: uniform
      min: 0
      max: 50
    ref:
      dist: norm
      loc: 20
      scale: 1
    latex: A^{\rm power}_{217}
    proposal: 1
  amp_143x217:
    prior:
      dist: uniform
      min: 0
      max: 50
    ref:
      dist: norm
      loc: 10
      scale: 1
    latex: A^{\rm power}_{143\times217}
    proposal: 1
  n_100:
    value: 1
  n_143:
    prior:
      dist: uniform
      min: 0
      max: 5
    ref:
      dist: norm
      loc: 1
      scale: 0.2
    latex: \gamma^{\rm power}_{143}
    proposal: 0.2
  n_217:
    prior:
      dist: uniform
      min: 0
      max: 5
    ref:
      dist: norm
      loc: 1
      scale: 0.2
    latex: \gamma^{\rm power}_{217}
    proposal: 0.2
  n_143x217:
    prior:
      dist: uniform
      min: 0
      max: 5
    ref:
      dist: norm
      loc: 1
      scale: 0.2
    latex: \gamma^{\rm power}_{143\times217}
    proposal: 0.2
  calTE:
    prior:
      dist: norm
      loc: 1
      scale: 0.01
    ref:
      dist: norm
      loc: 1
      scale: 0.01
    proposal: 0.01
    latex: c_{TE}
  calEE:
    prior:
      dist: norm
      loc: 1
      scale: 0.01
    ref:
      dist: norm
      loc: 1
      scale: 0.01
    proposal: 0.01
    latex: c_{EE}
  chi2__BAO:
    latex: \chi^2_\mathrm{BAO}
    derived: true
  chi2__CMB:
    latex: \chi^2_\mathrm{CMB}
    derived: true
  chi2__SN:
    latex: \chi^2_\mathrm{SN}
    derived: true
sampler:
  mcmc:
    sampler_type: mcmc
    supports_periodic_params: true
    burn_in: 0
    max_tries: 10000
    covmat: auto
    covmat_params: null
    proposal_scale: 1.0
    output_every: 60s
    learn_every: 40d
    temperature: 1
    learn_proposal: true
    learn_proposal_Rminus1_max: 2.0
    learn_proposal_Rminus1_max_early: 30.0
    learn_proposal_Rminus1_min: 0.0
    max_samples: 50000
    Rminus1_stop: 0.02
    Rminus1_cl_stop: 0.2
    Rminus1_cl_level: 0.95
    Rminus1_single_split: 4
    measure_speeds: true
    oversample_power: 0.4
    oversample_thin: true
    drag: false
    blocking:
    - - 1
      - - H0
        - omega_b
        - omega_cdm
        - n_s
        - logA
        - tau_reio
        - w0_fld
        - wa_fld
    - - 3
      - - xi_chi
        - chi_initial
    - - 5
      - - A_planck
    - - 6
      - - amp_143
        - amp_217
        - amp_143x217
        - n_143
        - n_217
        - n_143x217
        - calTE
        - calEE
    callback_function: null
    callback_every: null
    seed: null
    check_every: null
    oversample: null
    drag_limits: null
    fallback_covmat_scale: 4
    version: 3.6.2
output: eci_levier1B
packages_path: /root/crossed-cosmos/mcmc/packages
version: 3.6.2
