theory:
  classy:
    provides:
    - Hubble
    - angular_diameter_distance
    - rdrag
    extra_args:
      output: mPk
      N_ur: 2.0328
      N_ncdm: 1
      m_ncdm: 0.06
      Omega_Lambda: 0
      use_ppf: 'yes'
  eci_nmc_theory.ECINMCTheory:
    python_path: ./mcmc/cobaya_nmc/
    provides:
    - G_eff_over_GN
    - eta_slip
    - fsigma8
    - chi_of_a
    - wa_nmc_correction
likelihood:
  bao.desi_dr2.desi_bao_all: null
  sn.pantheonplus: null
params:
  H0:
    prior:
      min: 55
      max: 85
    ref:
      dist: norm
      loc: 67.4
      scale: 0.5
    proposal: 0.5
    latex: H_0
  omega_b:
    prior:
      min: 0.017
      max: 0.027
    ref:
      dist: norm
      loc: 0.02237
      scale: 0.00015
    proposal: 0.00015
    latex: \Omega_\mathrm{b} h^2
  omega_cdm:
    prior:
      min: 0.09
      max: 0.15
    ref:
      dist: norm
      loc: 0.12
      scale: 0.0012
    proposal: 0.0012
    latex: \Omega_\mathrm{c} h^2
  n_s:
    prior:
      min: 0.9
      max: 1.05
    ref:
      dist: norm
      loc: 0.9649
      scale: 0.0042
    proposal: 0.0042
    latex: n_\mathrm{s}
  logA:
    prior:
      min: 2.5
      max: 3.5
    ref:
      dist: norm
      loc: 3.044
      scale: 0.014
    proposal: 0.014
    drop: true
    latex: \log(10^{10} A_\mathrm{s})
  A_s:
    value: 'lambda logA: 1e-10*np.exp(logA)'
    latex: A_\mathrm{s}
  w0_fld:
    prior:
      min: -1.2
      max: -0.5
    ref:
      dist: norm
      loc: -1.0
      scale: 0.05
    proposal: 0.05
    latex: w_0
  wa_fld:
    prior:
      min: -2.0
      max: 0.0
    ref:
      dist: norm
      loc: 0.0
      scale: 0.1
    proposal: 0.1
    latex: w_a
  xi_chi:
    prior:
      min: -0.1
      max: 0.1
    ref:
      dist: norm
      loc: 0.0
      scale: 0.01
    proposal: 0.01
    latex: \xi_\chi
  chi_initial:
    prior:
      min: 0.05
      max: 0.2
    ref:
      dist: norm
      loc: 0.1
      scale: 0.01
    proposal: 0.01
    latex: \chi_\mathrm{ini}
  wa_nmc_correction:
    derived: true
    latex: \Delta w_a^\mathrm{NMC}
  Omega_m:
    latex: \Omega_\mathrm{m}
sampler:
  mcmc:
    burn_in: 0
    max_samples: 20000
    max_tries: 1000
    covmat: auto
    proposal_scale: 1.9
    Rminus1_stop: 0.05
    Rminus1_cl_stop: 0.2
    learn_proposal: true
    learn_proposal_Rminus1_max: 2.0
output: eci
packages_path: mcmc/packages/
