theory:
  classy:
    path: null
    speed: 0.2
    stop_at_error: false
    extra_args:
      output: mPk
      N_ur: 2.0328
      N_ncdm: 1
      m_ncdm: 0.06
      Omega_Lambda: 0
      use_ppf: 'yes'
    ignore_obsolete: false
    renames:
      As: A_s
      ns: n_s
      nrun: alpha_s
      nrunrun: beta_s
      nt: n_t
      ntrun: alpha_t
      rdrag: rs_drag
      omegak: Omega_k
      omegal: Omega_Lambda
      w: w0_fld
      wa: wa_fld
      omegabh2: omega_b
      omegab: Omega_b
      omegach2: omega_cdm
      omegac: Omega_cdm
      omegam: Omega_m
      omegan: Omega_nu
      tau: tau_reio
      zrei: z_reio
      deltazrei: reionization_width
      helium_redshift: helium_fullreio_redshift
      helium_delta_redshift: helium_fullreio_width
      yhe: YHe
      yheused: YHe
    version: v3.3.4
    provides:
    - Hubble
    - angular_diameter_distance
    - rdrag
    input_params:
    - H0
    - omega_b
    - omega_cdm
    - n_s
    - A_s
    - w0_fld
    - wa_fld
    output_params:
    - Omega_m
  eci_nmc_theory.ECINMCTheory:
    params:
      xi_chi: null
      chi_initial: null
    alpha: 0.55
    Omega_m_fiducial: 0.315
    speed: -1
    stop_at_error: false
    version: null
    python_path: ./mcmc/cobaya_nmc/
    provides:
    - G_eff_over_GN
    - eta_slip
    - fsigma8
    - chi_of_a
    - wa_nmc_correction
    input_params:
    - xi_chi
    - chi_initial
    output_params:
    - wa_nmc_correction
likelihood:
  bao.desi_dr2.desi_bao_all:
    path: null
    measurements_file: bao_data/desi_bao_dr2/desi_gaussian_bao_ALL_GCcomb_mean.txt
    cov_file: bao_data/desi_bao_dr2/desi_gaussian_bao_ALL_GCcomb_cov.txt
    rs_fid: 1
    aliases:
    - BAO
    speed: 2000
    type: BAO
    rs_rescale: null
    prob_dist: null
    invcov_file: null
    redshift: null
    observable_1: null
    observable_2: null
    observable_3: null
    grid_file: null
    stop_at_error: false
    version: null
    input_params: []
    output_params: []
  sn.pantheonplus:
    path: null
    dataset_file: PantheonPlus/config.dataset
    dataset_params: null
    aliases:
    - PantheonPlus
    use_abs_mag: false
    speed: 100
    type: SN
    stop_at_error: false
    version: null
    input_params: []
    output_params: []
params:
  H0:
    prior:
      min: 55
      max: 85
    ref:
      dist: norm
      loc: 67.4
      scale: 0.5
    proposal: 0.5
    latex: H_0
  omega_b:
    prior:
      min: 0.017
      max: 0.027
    ref:
      dist: norm
      loc: 0.02237
      scale: 0.00015
    proposal: 0.00015
    latex: \Omega_\mathrm{b} h^2
    renames:
    - omegabh2
  omega_cdm:
    prior:
      min: 0.09
      max: 0.15
    ref:
      dist: norm
      loc: 0.12
      scale: 0.0012
    proposal: 0.0012
    latex: \Omega_\mathrm{c} h^2
    renames:
    - omegach2
  n_s:
    prior:
      min: 0.9
      max: 1.05
    ref:
      dist: norm
      loc: 0.9649
      scale: 0.0042
    proposal: 0.0042
    latex: n_\mathrm{s}
    renames:
    - ns
  logA:
    prior:
      min: 2.5
      max: 3.5
    ref:
      dist: norm
      loc: 3.044
      scale: 0.014
    proposal: 0.014
    drop: true
    latex: \log(10^{10} A_\mathrm{s})
  A_s:
    value: 'lambda logA: 1e-10*np.exp(logA)'
    latex: A_\mathrm{s}
    derived: true
    renames:
    - As
  w0_fld:
    prior:
      min: -1.2
      max: -0.5
    ref:
      dist: norm
      loc: -1.0
      scale: 0.05
    proposal: 0.05
    latex: w_0
    renames:
    - w
  wa_fld:
    prior:
      min: -2.0
      max: 0.0
    ref:
      dist: norm
      loc: 0.0
      scale: 0.1
    proposal: 0.1
    latex: w_a
    renames:
    - wa
  xi_chi:
    prior:
      min: -0.1
      max: 0.1
    ref:
      dist: norm
      loc: 0.0
      scale: 0.01
    proposal: 0.01
    latex: \xi_\chi
  chi_initial:
    prior:
      min: 0.05
      max: 0.2
    ref:
      dist: norm
      loc: 0.1
      scale: 0.01
    proposal: 0.01
    latex: \chi_\mathrm{ini}
  wa_nmc_correction:
    derived: true
    latex: \Delta w_a^\mathrm{NMC}
  Omega_m:
    latex: \Omega_\mathrm{m}
    derived: true
    renames:
    - omegam
  chi2__BAO:
    latex: \chi^2_\mathrm{BAO}
    derived: true
  chi2__SN:
    latex: \chi^2_\mathrm{SN}
    derived: true
sampler:
  mcmc:
    sampler_type: mcmc
    supports_periodic_params: true
    burn_in: 0
    max_tries: 1000
    covmat: auto
    covmat_params: null
    proposal_scale: 1.9
    output_every: 60s
    learn_every: 40d
    temperature: 1
    learn_proposal: true
    learn_proposal_Rminus1_max: 2.0
    learn_proposal_Rminus1_max_early: 30.0
    learn_proposal_Rminus1_min: 0.0
    max_samples: 20000
    Rminus1_stop: 0.05
    Rminus1_cl_stop: 0.2
    Rminus1_cl_level: 0.95
    Rminus1_single_split: 4
    measure_speeds: true
    oversample_power: 0.4
    oversample_thin: true
    drag: false
    blocking:
    - - 1
      - - H0
        - omega_b
        - omega_cdm
        - n_s
        - logA
        - w0_fld
        - wa_fld
    - - 2
      - - xi_chi
        - chi_initial
    callback_function: null
    callback_every: null
    seed: null
    check_every: null
    oversample: null
    drag_limits: null
    fallback_covmat_scale: 4
    version: 3.6.2
output: eci
packages_path: mcmc/packages/
version: 3.6.2
