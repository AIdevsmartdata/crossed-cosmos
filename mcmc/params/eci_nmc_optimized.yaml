# ============================================================================
# ECI v4 — Cobaya input  (OPTIMIZED for wall-clock)
# ---------------------------------------------------------------------------
# Differences vs. eci_nmc.yaml (reference, untouched):
#   - Plik-lite TTTEEE only (no full TTTEEE nuisance vector)   -> ~10x faster
#     per step, retains ~95% of the constraining power on this parameter set.
#   - oversample_power = 0.4  (default in ECI v3, now made explicit)
#   - drag             = true (fast-slow dragging on Plik-lite nuisance)
#   - blocking         = explicit slow/fast split so dragging knows what is
#     fast (A_planck) and what is slow (everything CLASS touches).
#   - covmat           = auto (ok); keep proposal_scale = 1.9
#
# Benchmarked: 3.04 s / theory+likelihood evaluation on i5-14600KF, 2 threads,
# CLASS built -O3 -march=native -mavx2 -mtune=native -flto. See
# mcmc/benchmark/REPORT.md for scaling on cloud targets.
# ============================================================================

theory:
  classy:
    ignore_obsolete: true   # hi_class_nmc self-reports upstream v3.2.3
    extra_args:
      output: tCl,pCl,lCl,mPk
      lensing: "yes"
      N_ur: 2.0328
      N_ncdm: 1
      m_ncdm: 0.06
      Omega_Lambda: 0
      use_ppf: "yes"
      # NMC patch knob (ignored by vanilla CLASS):
      nmc_xi_chi: 0.0

likelihood:
  planck_2018_lowl.TT:
  planck_2018_lowl.EE:
  planck_2018_highl_plik.TTTEEE_lite:
  bao.desi_dr2.desi_bao_all:
  sn.pantheonplus:
  # act_dr6_lenslike.ACTDR6LensLike:   # optional — not used for main run

params:
  # ---------- Standard ΛCDM-ish ----------
  H0:
    prior: {min: 55, max: 85}
    ref:   {dist: norm, loc: 67.4, scale: 0.5}
    proposal: 0.5
    latex: H_0
  omega_b:
    prior: {min: 0.017, max: 0.027}
    ref:   {dist: norm, loc: 0.02237, scale: 0.00015}
    proposal: 0.00015
    latex: \Omega_\mathrm{b} h^2
  omega_cdm:
    prior: {min: 0.09, max: 0.15}
    ref:   {dist: norm, loc: 0.1200, scale: 0.0012}
    proposal: 0.0012
    latex: \Omega_\mathrm{c} h^2
  n_s:
    prior: {min: 0.9, max: 1.05}
    ref:   {dist: norm, loc: 0.9649, scale: 0.0042}
    proposal: 0.0042
    latex: n_\mathrm{s}
  logA:
    prior: {min: 2.5, max: 3.5}
    ref:   {dist: norm, loc: 3.044, scale: 0.014}
    proposal: 0.014
    drop: True
    latex: \log(10^{10} A_\mathrm{s})
  A_s:
    value: "lambda logA: 1e-10*np.exp(logA)"
    latex: A_\mathrm{s}
  tau_reio:
    prior: {min: 0.02, max: 0.12}
    ref:   {dist: norm, loc: 0.0544, scale: 0.0073}
    proposal: 0.0073
    latex: \tau_\mathrm{reio}

  # ---------- w0-wa CPL dark energy ----------
  w0_fld:
    prior: {min: -1.2, max: -0.5}
    ref:   {dist: norm, loc: -1.0, scale: 0.05}
    proposal: 0.05
    latex: w_0
  wa_fld:
    prior: {min: -2.0, max: 0.0}
    ref:   {dist: norm, loc: 0.0, scale: 0.1}
    proposal: 0.1
    latex: w_a

  # ---------- ECI v4 non-minimal coupling ----------
  nmc_xi_chi:
    prior: {min: -0.1, max: 0.1}
    ref:   {dist: norm, loc: 0.0, scale: 0.01}
    proposal: 0.01
    latex: \xi_\chi

  # ---------- Early dark energy ----------
  f_EDE:
    prior: {min: 0.0, max: 0.2}
    ref:   {dist: norm, loc: 0.05, scale: 0.02}
    proposal: 0.02
    latex: f_\mathrm{EDE}

  # ---------- Derived ----------
  sigma8:
    latex: \sigma_8
  Omega_m:
    latex: \Omega_\mathrm{m}

sampler:
  mcmc:
    burn_in: 0
    max_tries: 1000
    covmat: auto
    proposal_scale: 1.9
    Rminus1_stop: 0.05
    Rminus1_cl_stop: 0.2
    learn_proposal: true
    learn_proposal_Rminus1_max: 2.0
    # Fast-slow split: dragging pays off because Plik-lite has exactly ONE
    # nuisance parameter (A_planck), so oversampling it is nearly free.
    drag: true
    oversample_power: 0.4
    # Explicit blocking (1 = slow cosmo, 2 = fast Plik-lite nuisance).
    # Cobaya auto-blocks but we spell it out so it survives YAML merges.
    blocking:
      - [1, [H0, omega_b, omega_cdm, n_s, logA, tau_reio, w0_fld, wa_fld, nmc_xi_chi, f_EDE]]
      - [2, [A_planck]]

output: chains/eci_nmc_opt

# Run with: cobaya-run -r params/eci_nmc_optimized.yaml
